name: "[deprecated] Vibe 월·목 (Z세대·도시)"
# deprecated 2026-06-08: ai-news-daily.yml (vibe_search.py v2)로 통합됨

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  SEEN_FILE: seen-titles.txt

jobs:
  z-lifestyle:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install feedparser anthropic requests python-dateutil
      - name: Z세대·도시 수집
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_WEEKLY_BRIEFING }}
          DISCORD_AUTO_CANDIDATES_WEBHOOK: ${{ secrets.DISCORD_AUTO_CANDIDATES_WEBHOOK }}
          SEEN_FILE: ${{ env.SEEN_FILE }}
        run: python scripts/z_lifestyle_digest.py
