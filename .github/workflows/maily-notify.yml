name: 메일리 뉴스레터 알림

on:
  # schedule 비활성화: Cloudflare Worker(maily-discord-notify)가 실시간 처리
  # - cron: '0 * * * *'
  workflow_dispatch:  # 수동 테스트용으로만 유지

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  LAST_ID_FILE: '.github/maily-last-guid'

concurrency:
  group: maily-notify
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Maily API
        id: maily
        env:
          MAILY_API_TOKEN: ${{ secrets.MAILY_API_TOKEN }}
        run: |
          python3 .github/scripts/check_maily.py \
            "$MAILY_API_TOKEN" \
            "$LAST_ID_FILE" \
            >> "$GITHUB_OUTPUT"

      - name: Send Discord notification
        if: steps.maily.outputs.new == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL_MAILY }}
          TITLE:     ${{ steps.maily.outputs.title }}
          LINK:      ${{ steps.maily.outputs.link }}
          PUB_DATE:  ${{ steps.maily.outputs.pub_date }}
          EXCERPT:   ${{ steps.maily.outputs.excerpt }}
          THUMBNAIL: ${{ steps.maily.outputs.thumbnail }}
        run: |
          DESCRIPTION="${EXCERPT}"
          [ -z "$DESCRIPTION" ] && DESCRIPTION="(미리보기 없음)"

          PAYLOAD=$(jq -n \
            --arg title  "$TITLE" \
            --arg link   "$LINK" \
            --arg desc   "$DESCRIPTION" \
            --arg footer "차우진의 엔터문화연구소 뉴스레터 · $PUB_DATE" \
            --arg thumb  "$THUMBNAIL" \
            '{
              thread_name: $title,
              username: "엔터문화연구소",
              embeds: [{
                title:       $title,
                url:         $link,
                description: $desc,
                color:       8061951,
                image:       (if $thumb != "" then {url: $thumb} else null end),
                footer:      { text: $footer }
              }]
            }')

          RESPONSE=$(curl -s -w "\nHTTP_CODE:%{http_code}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL")

          HTTP_CODE=$(echo "$RESPONSE" | grep -o 'HTTP_CODE:[0-9]*' | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_CODE:/d')
          echo "Discord webhook HTTP: $HTTP_CODE"
          [ -n "$BODY" ] && echo "Discord response: $BODY"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Discord webhook 실패 (HTTP $HTTP_CODE): $BODY"
            exit 1
          fi

      - name: Update last-id
        if: steps.maily.outputs.new == 'true'
        run: |
          echo "${{ steps.maily.outputs.post_id }}" > "$LAST_ID_FILE"
          git config user.name  "neovibelab"
          git config user.email "neovibelab@users.noreply.github.com"
          git add "$LAST_ID_FILE"
          git commit -m "chore(maily): last-id 갱신"
          git push
