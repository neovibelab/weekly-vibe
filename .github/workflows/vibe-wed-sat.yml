name: Vibe 수·토 (중국 엔터)

on:
  schedule:
    - cron: '0 1 * * 3,6'   # 수·토 10:00 KST
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  SEEN_FILE: seen-titles.txt

jobs:
  china-ent:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install feedparser anthropic requests python-dateutil
      - name: 중국 엔터 수집
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_WEEKLY_BRIEFING }}
          DISCORD_CHINA_ASIA_WEBHOOK: ${{ secrets.DISCORD_CHINA_ASIA_WEBHOOK }}
          SEEN_FILE: ${{ env.SEEN_FILE }}
        run: python scripts/china_ent_digest.py
