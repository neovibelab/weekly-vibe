# DEPRECATED 2026-06-01 — ai-news-daily.yml china-ent job으로 통합됨. 이 파일은 비활성.
name: 중국 엔터 뉴스 데일리 (deprecated)

on:
  workflow_dispatch:  # 수동 트리거만, 스케줄 제거
    inputs:
      session:
        description: 'AM (한국어) 또는 PM (중국현지). 비우면 시각 자동 판별.'
        required: false
        default: ''
        type: choice
        options: ['', 'AM', 'PM']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 의존 라이브러리 설치
        run: pip install feedparser anthropic requests python-dateutil

      - name: 중국 엔터 뉴스 다이제스트 실행
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_WEEKLY_BRIEFING }}
          DISCORD_CHINA_ENT_WEBHOOK: ${{ secrets.DISCORD_CHINA_ENT_WEBHOOK }}
          SESSION: ${{ inputs.session }}
        run: python scripts/china_ent_digest.py
