name: 중국 엔터 뉴스 데일리

on:
  schedule:
    - cron: '0 0 * * *'   # 매일 09:00 KST (00:00 UTC)
    - cron: '0 6 * * *'   # 매일 15:00 KST (06:00 UTC)
  workflow_dispatch:
    inputs:
      session:
        description: 'AM (한국어) 또는 PM (중국현지). 비우면 시각 자동 판별.'
        required: false
        default: ''
        type: choice
        options: ['', 'AM', 'PM']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 의존 라이브러리 설치
        run: pip install feedparser anthropic requests python-dateutil

      - name: 중국 엔터 뉴스 다이제스트 실행
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_WEEKLY_BRIEFING }}
          DISCORD_CHINA_ENT_WEBHOOK: ${{ secrets.DISCORD_CHINA_ENT_WEBHOOK }}
          SESSION: ${{ inputs.session }}
        run: python scripts/china_ent_digest.py
