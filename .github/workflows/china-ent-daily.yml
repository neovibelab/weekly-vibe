name: 중국 엔터 뉴스 데일리

on:
  schedule:
    - cron: '30 0 * * *'  # 매일 00:30 UTC = 09:30 KST (ai-news-daily와 30분 간격)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 의존 라이브러리 설치
        run: pip install feedparser anthropic requests python-dateutil

      - name: 중국 엔터 뉴스 다이제스트 실행
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_WEEKLY_BRIEFING }}
          DISCORD_CHINA_ENT_WEBHOOK: ${{ secrets.DISCORD_CHINA_ENT_WEBHOOK }}
        run: python scripts/china_ent_digest.py
