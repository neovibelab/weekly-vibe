name: 디스코드 주간 브리핑 알림

on:
  schedule:
    - cron: '0 0 * * 6'  # 토요일 09:00 KST (00:00 UTC)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse latest issue
        id: issue
        run: |
          # 최신 NEWSPAPER_ 파일명 추출
          HREF=$(grep -o 'href="NEWSPAPER_[^"]*"' index.html | head -1 | grep -o 'NEWSPAPER_[^"]*')
          if [ -z "$HREF" ]; then
            echo "::error::index.html에서 최신 호를 찾을 수 없음"
            exit 1
          fi

          # 헤드라인·날짜 추출
          TITLE_RAW=$(grep -A3 "href=\"${HREF}\"" index.html \
            | grep 'issue-title' \
            | sed 's/.*class="issue-title">//; s/<[^>]*>//g; s/&mdash;/—/g; s/&middot;/·/g' \
            | xargs)
          DATE_PART=$(echo "$TITLE_RAW" | grep -o '[0-9]\{4\}\.[0-9]\{2\}\.[0-9]\{2\}')
          HEADLINE=$(echo "$TITLE_RAW" | sed 's/^[0-9]\{4\}\.[0-9]\{2\}\.[0-9]\{2\} — //')
          URL="https://weeklybriefing.vercel.app/${HREF}"

          # TL;DR 항목 파싱 (HTML 태그·엔티티 제거)
          TLDR=$(python3 .github/scripts/parse_tldr.py "$HREF")

          # 멀티라인 값은 GitHub Output delimiter 방식으로 저장
          echo "date=$DATE_PART"     >> "$GITHUB_OUTPUT"
          echo "headline=$HEADLINE" >> "$GITHUB_OUTPUT"
          echo "url=$URL"           >> "$GITHUB_OUTPUT"
          {
            echo "tldr<<EOF_TLDR"
            echo "$TLDR"
            echo "EOF_TLDR"
          } >> "$GITHUB_OUTPUT"

          echo "[info] ${DATE_PART} — ${HEADLINE} → ${URL}"
          echo "[tldr] $TLDR"

      - name: Send Discord webhook
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ISSUE_DATE: ${{ steps.issue.outputs.date }}
          ISSUE_HEADLINE: ${{ steps.issue.outputs.headline }}
          ISSUE_URL: ${{ steps.issue.outputs.url }}
          ISSUE_TLDR: ${{ steps.issue.outputs.tldr }}
        run: |
          # TL;DR 각 줄을 "• item" 형태로 변환
          BULLETS=$(echo "$ISSUE_TLDR" | sed 's/^/• /')
          DESCRIPTION="$(printf '%s\n\n**이번 주 이슈 요약**\n%s' "$ISSUE_HEADLINE" "$BULLETS")"

          THREAD_TITLE="📰 글로벌 주간 브리핑 — ${ISSUE_DATE}"
          PAYLOAD=$(jq -n \
            --arg thread "$THREAD_TITLE" \
            --arg date  "$ISSUE_DATE" \
            --arg desc  "$DESCRIPTION" \
            --arg url   "$ISSUE_URL" \
            '{
              thread_name: $thread,
              username: "엔터문화연구소",
              embeds: [{
                title:       ("📰 글로벌 주간 브리핑 — " + $date),
                description: $desc,
                url:         $url,
                color:       13172480,
                footer: { text: "Weekly Business Briefing: US · China · Japan" }
              }]
            }')

          echo "[debug] payload preview: $(echo "$PAYLOAD" | head -c 300)"

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Discord webhook HTTP: $HTTP_CODE"
          echo "Discord response: $BODY"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Discord webhook 실패 (HTTP $HTTP_CODE)"
            exit 1
          fi
