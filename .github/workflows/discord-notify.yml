name: 디스코드 주간 브리핑 알림

on:
  schedule:
    - cron: '0 0 * * 6'  # 토요일 09:00 KST (00:00 UTC)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse latest issue from index.html
        id: issue
        run: |
          # index.html에서 최신 NEWSPAPER_ 항목 추출
          HREF=$(grep -o 'href="NEWSPAPER_[^"]*"' index.html | head -1 | grep -o 'NEWSPAPER_[^"]*')
          if [ -z "$HREF" ]; then
            echo "::error::index.html에서 최신 호를 찾을 수 없음"
            exit 1
          fi
          # issue-title 텍스트 추출 (HTML 엔티티 제거)
          TITLE_RAW=$(grep -A3 "href=\"${HREF}\"" index.html \
            | grep 'issue-title' \
            | sed 's/.*class="issue-title">//; s/<[^>]*>//g; s/&mdash;/—/g; s/&middot;/·/g' \
            | xargs)
          DATE_PART=$(echo "$TITLE_RAW" | grep -o '[0-9]\{4\}\.[0-9]\{2\}\.[0-9]\{2\}')
          HEADLINE=$(echo "$TITLE_RAW" | sed 's/^[0-9]\{4\}\.[0-9]\{2\}\.[0-9]\{2\} — //')
          URL="https://weeklybriefing.vercel.app/${HREF}"
          echo "date=$DATE_PART"       >> "$GITHUB_OUTPUT"
          echo "headline=$HEADLINE"   >> "$GITHUB_OUTPUT"
          echo "url=$URL"             >> "$GITHUB_OUTPUT"
          echo "[info] ${DATE_PART} — ${HEADLINE} → ${URL}"

      - name: Send Discord webhook
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ISSUE_DATE: ${{ steps.issue.outputs.date }}
          ISSUE_HEADLINE: ${{ steps.issue.outputs.headline }}
          ISSUE_URL: ${{ steps.issue.outputs.url }}
        run: |
          PAYLOAD=$(jq -n \
            --arg date     "$ISSUE_DATE" \
            --arg headline "$ISSUE_HEADLINE" \
            --arg url      "$ISSUE_URL" \
            '{
              username: "엔터문화연구소",
              embeds: [{
                title:       ("📰 글로벌 주간 브리핑 — " + $date),
                description: $headline,
                url:         $url,
                color:       13172480,
                footer: { text: "Weekly Business Briefing: US · China · Japan" }
              }]
            }')

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL")

          echo "Discord webhook HTTP: $HTTP_CODE"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Discord webhook 실패 (HTTP $HTTP_CODE)"
            exit 1
          fi
