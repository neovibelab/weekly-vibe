name: AI 음악 뉴스 데일리

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 00:00 UTC = 09:00 KST
  workflow_dispatch:      # 수동 실행 (테스트용)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 의존 라이브러리 설치
        run: pip install feedparser anthropic requests python-dateutil

      - name: AI 뉴스 다이제스트 실행
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_WEEKLY_BRIEFING }}
          DISCORD_AI_TALK_WEBHOOK: ${{ secrets.DISCORD_AI_TALK_WEBHOOK }}
        run: python scripts/ai_news_digest.py
