name: Vibe 신호 수집 데일리

on:
  schedule:
    - cron: '0 0 * * *'   # 매일 09:00 KST (00:00 UTC)
    - cron: '0 6 * * *'   # 매일 15:00 KST (06:00 UTC)
  workflow_dispatch:
    inputs:
      session:
        description: '세션 강제 지정 (AI뉴스=AM, 영음악=PM, 비우면 시각 자동)'
        required: false
        default: ''
        type: choice
        options: ['', 'AM', 'PM']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  SEEN_FILE: seen-titles.txt   # 채널 간 중복 제거용 공유 파일

jobs:
  # ── 1st: AI·음악 ────────────────────────────────
  ai-music:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 의존 라이브러리 설치
        run: pip install feedparser anthropic requests python-dateutil
      - name: AI·음악 Vibe 수집
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_WEEKLY_BRIEFING }}
          DISCORD_AI_NEWS_WEBHOOK: ${{ secrets.DISCORD_AI_NEWS_WEBHOOK }}
          DISCORD_EN_MUSIC_WEBHOOK: ${{ secrets.DISCORD_EN_MUSIC_WEBHOOK }}
          DISCORD_DEALS_WEBHOOK: ${{ secrets.DISCORD_DEALS_WEBHOOK }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          SESSION: ${{ inputs.session }}
          SEEN_FILE: ${{ env.SEEN_FILE }}
        run: python scripts/ai_news_digest.py
      - name: seen-titles 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seen-titles
          path: ${{ env.SEEN_FILE }}
          if-no-files-found: warn
          overwrite: true

  # ── 2nd: 중국&아시아 (ai-music 완료 후) ──────────
  china-ent:
    needs: ai-music
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 의존 라이브러리 설치
        run: pip install feedparser anthropic requests python-dateutil
      - name: seen-titles 다운로드
        uses: actions/download-artifact@v4
        with:
          name: seen-titles
          path: .
        continue-on-error: true
      - name: China & Asia Vibe 수집
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_WEEKLY_BRIEFING }}
          DISCORD_CHINA_ASIA_WEBHOOK: ${{ secrets.DISCORD_CHINA_ASIA_WEBHOOK }}
          DISCORD_DEALS_WEBHOOK: ${{ secrets.DISCORD_DEALS_WEBHOOK }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          SEEN_FILE: ${{ env.SEEN_FILE }}
        run: python scripts/china_ent_digest.py
      - name: seen-titles 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seen-titles
          path: ${{ env.SEEN_FILE }}
          if-no-files-found: warn
          overwrite: true

  # ── 3rd: Z세대 바이브 (china-ent 완료 후) ─────────
  z-lifestyle:
    needs: china-ent
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 의존 라이브러리 설치
        run: pip install feedparser anthropic requests python-dateutil
      - name: seen-titles 다운로드
        uses: actions/download-artifact@v4
        with:
          name: seen-titles
          path: .
        continue-on-error: true
      - name: Z-Gen & City Vibe 수집
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_WEEKLY_BRIEFING }}
          DISCORD_AUTO_CANDIDATES_WEBHOOK: ${{ secrets.DISCORD_AUTO_CANDIDATES_WEBHOOK }}
          DISCORD_DEALS_WEBHOOK: ${{ secrets.DISCORD_DEALS_WEBHOOK }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          SEEN_FILE: ${{ env.SEEN_FILE }}
        run: python scripts/z_lifestyle_digest.py
