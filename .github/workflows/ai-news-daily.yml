name: Vibe 후보 수집 (매일)
# v3: 지역·언어 기반 수집. 지역별 현지 발행 리듬에 맞춰 3개 시간대로 분산 (2026-06-17).
#   오전 07:00 KST — 한국·일본 (UTC+9, 현지 조간 직후)
#   오후 14:00 KST — 중국·동남아 (UTC+7~8, 현지 정오 = 그날 오전 기사 반영)
#   저녁 21:00 KST — 글로벌(영어, 영국 오후·미국 전일 마감분 흡수)
# 단일 워크플로 + cron 3개. 각 지역 step의 if가 예약(schedule)·수동(region input)을 분기.
# 한 번의 예약 실행엔 해당 시간대 지역만 돌고 나머지는 skip(outcome=skipped, 경보 무시).

on:
  schedule:
    - cron: '0 22 * * *'   # 07:00 KST — 한국·일본
    - cron: '0 5 * * *'    # 14:00 KST — 중국·동남아
    - cron: '0 12 * * *'   # 21:00 KST — 글로벌(영어)
  workflow_dispatch:
    inputs:
      region:
        description: '테스트할 지역 (비우면 전체 실행)'
        required: false
        type: choice
        options:
          - all
          - korea
          - global-en
          - china
          - japan
          - southeast-asia
      dry_run:
        description: 'dry-run (검색·검증만 — 디스코드·Supabase 미반영, 기준 테스트용)'
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  SEEN_FILE: seen-titles.txt

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 55  # 지역별 10분 × 5 + 여유 (수동 all 기준). 예약은 1~2지역이라 더 짧음.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install anthropic requests

      # 각 지역 스텝은 continue-on-error: true — 한 지역이 죽어도 다음 지역은 계속.
      # if 조건: 수동 dispatch는 region input을 따르고(빈값/all=전체), 예약은
      # github.event.schedule(트리거된 cron)로 그 시간대 지역만 실행한다.
      # 실패는 step.outcome=failure 로 남고 마지막 경보 스텝이 woojin@ 에 메일.
      # skip된 지역은 outcome=skipped 라 경보에서 무시된다(notify_region_failure.py).

      - name: 한국
        id: korea
        if: ${{ (github.event_name == 'workflow_dispatch' && (github.event.inputs.region == '' || github.event.inputs.region == 'all' || github.event.inputs.region == 'korea')) || (github.event_name == 'schedule' && github.event.schedule == '0 22 * * *') }}
        timeout-minutes: 10
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_WEEKLY_BRIEFING }}
          DISCORD_KOREA_WEBHOOK: ${{ secrets.DISCORD_KOREA_WEBHOOK }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SEEN_FILE: ${{ env.SEEN_FILE }}
        run: python scripts/vibe_search.py korea ${{ inputs.dry_run && '--dry-run' || '' }}

      - name: 글로벌(영어)
        id: global_en
        if: ${{ (github.event_name == 'workflow_dispatch' && (github.event.inputs.region == '' || github.event.inputs.region == 'all' || github.event.inputs.region == 'global-en')) || (github.event_name == 'schedule' && github.event.schedule == '0 12 * * *') }}
        timeout-minutes: 10
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_WEEKLY_BRIEFING }}
          DISCORD_GLOBAL_EN_WEBHOOK: ${{ secrets.DISCORD_GLOBAL_EN_WEBHOOK }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SEEN_FILE: ${{ env.SEEN_FILE }}
        run: python scripts/vibe_search.py global-en ${{ inputs.dry_run && '--dry-run' || '' }}

      - name: 중국
        id: china
        if: ${{ (github.event_name == 'workflow_dispatch' && (github.event.inputs.region == '' || github.event.inputs.region == 'all' || github.event.inputs.region == 'china')) || (github.event_name == 'schedule' && github.event.schedule == '0 5 * * *') }}
        timeout-minutes: 10
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_WEEKLY_BRIEFING }}
          DISCORD_CHINA_WEBHOOK: ${{ secrets.DISCORD_CHINA_WEBHOOK }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SEEN_FILE: ${{ env.SEEN_FILE }}
          MAX_AGE_HOURS: '168'   # 중국만 7일 컷 (48h에서 4일 연속 0건, 2026-06-14)
          ALLOW_UNDATED: '1'     # 발행일 미상 게재 허용 (중국어 매체 page_age 누락 빈번)
        run: python scripts/vibe_search.py china ${{ inputs.dry_run && '--dry-run' || '' }}

      - name: 일본
        id: japan
        if: ${{ (github.event_name == 'workflow_dispatch' && (github.event.inputs.region == '' || github.event.inputs.region == 'all' || github.event.inputs.region == 'japan')) || (github.event_name == 'schedule' && github.event.schedule == '0 22 * * *') }}
        timeout-minutes: 10
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_WEEKLY_BRIEFING }}
          DISCORD_JAPAN_WEBHOOK: ${{ secrets.DISCORD_JAPAN_WEBHOOK }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SEEN_FILE: ${{ env.SEEN_FILE }}
        run: python scripts/vibe_search.py japan ${{ inputs.dry_run && '--dry-run' || '' }}

      - name: 동남아
        id: sea
        if: ${{ (github.event_name == 'workflow_dispatch' && (github.event.inputs.region == '' || github.event.inputs.region == 'all' || github.event.inputs.region == 'southeast-asia')) || (github.event_name == 'schedule' && github.event.schedule == '0 5 * * *') }}
        timeout-minutes: 10
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_WEEKLY_BRIEFING }}
          DISCORD_SOUTHEAST_ASIA_WEBHOOK: ${{ secrets.DISCORD_SOUTHEAST_ASIA_WEBHOOK }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SEEN_FILE: ${{ env.SEEN_FILE }}
          MAX_AGE_HOURS: '168'   # 동남아도 web_search 최신성 약함 — 7일 컷 (2026-06-19, 중국 선례)
        run: python scripts/vibe_search.py southeast-asia ${{ inputs.dry_run && '--dry-run' || '' }}

      # 침묵 실패 경보: 위 지역 중 검색 실패(outcome=failure)가 있으면 woojin@ 메일.
      # always() — 앞 스텝 결과와 무관하게 항상 평가. skip(skipped)·정상(success)은
      # 무시하고 failure만 모아 통지. 시간차 분산이라 한 번에 일부 지역만 돌아도 안전.
      - name: 실패 지역 메일 경보
        if: always()
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          OUTCOME_KOREA: ${{ steps.korea.outcome }}
          OUTCOME_GLOBAL: ${{ steps.global_en.outcome }}
          OUTCOME_CHINA: ${{ steps.china.outcome }}
          OUTCOME_JAPAN: ${{ steps.japan.outcome }}
          OUTCOME_SEA: ${{ steps.sea.outcome }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python scripts/notify_region_failure.py
