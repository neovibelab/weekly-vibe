name: Vibe 신호 수집 데일리

on:
  schedule:
    - cron: '0 0 * * *'   # 매일 09:00 KST (00:00 UTC)
    - cron: '0 6 * * *'   # 매일 15:00 KST (06:00 UTC)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  SEEN_FILE: seen-titles.txt   # 채널 간 중복 제거용 공유 파일

jobs:
  # ── 1st: AI·음악 ────────────────────────────────
  ai-music:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 의존 라이브러리 설치
        run: pip install feedparser anthropic requests python-dateutil
      - name: AI·음악 Vibe 수집
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_WEEKLY_BRIEFING }}
          DISCORD_AI_NEWS_WEBHOOK: ${{ secrets.DISCORD_AI_NEWS_WEBHOOK }}
          SEEN_FILE: ${{ env.SEEN_FILE }}
        run: python scripts/ai_music_digest.py
      - name: seen-titles 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seen-titles
          path: ${{ env.SEEN_FILE }}
          if-no-files-found: warn
          overwrite: true

  # ── 2nd: 서양 음악·씬 (ai-music 완료 후) ─────────────
  western-music:
    needs: ai-music
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 의존 라이브러리 설치
        run: pip install feedparser anthropic requests python-dateutil
      - name: seen-titles 다운로드
        uses: actions/download-artifact@v4
        with:
          name: seen-titles
          path: .
        continue-on-error: true
      - name: 서양 음악·씬 Vibe 수집
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_WEEKLY_BRIEFING }}
          DISCORD_EN_MUSIC_WEBHOOK: ${{ secrets.DISCORD_EN_MUSIC_WEBHOOK }}
          SEEN_FILE: ${{ env.SEEN_FILE }}
        run: python scripts/western_music_digest.py
      - name: seen-titles 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seen-titles
          path: ${{ env.SEEN_FILE }}
          if-no-files-found: warn
          overwrite: true

  # ── 3rd: 한국 엔터 (western-music 완료 후) ─────────────
  korea-ent:
    needs: western-music
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 의존 라이브러리 설치
        run: pip install feedparser anthropic requests python-dateutil
      - name: seen-titles 다운로드
        uses: actions/download-artifact@v4
        with:
          name: seen-titles
          path: .
        continue-on-error: true
      - name: 한국 엔터 Vibe 수집
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_WEEKLY_BRIEFING }}
          DISCORD_KOREA_ENT_WEBHOOK: ${{ secrets.DISCORD_KOREA_ENT_WEBHOOK }}
          SEEN_FILE: ${{ env.SEEN_FILE }}
        run: python scripts/korea_ent_digest.py
      - name: seen-titles 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seen-titles
          path: ${{ env.SEEN_FILE }}
          if-no-files-found: warn
          overwrite: true

  # ── 4th: 중국 엔터 (korea-ent 완료 후) ─────────────
  china-ent:
    needs: korea-ent
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 의존 라이브러리 설치
        run: pip install feedparser anthropic requests python-dateutil
      - name: seen-titles 다운로드
        uses: actions/download-artifact@v4
        with:
          name: seen-titles
          path: .
        continue-on-error: true
      - name: China & Asia Vibe 수집
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_WEEKLY_BRIEFING }}
          DISCORD_CHINA_ASIA_WEBHOOK: ${{ secrets.DISCORD_CHINA_ASIA_WEBHOOK }}
          SEEN_FILE: ${{ env.SEEN_FILE }}
        run: python scripts/china_ent_digest.py
      - name: seen-titles 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seen-titles
          path: ${{ env.SEEN_FILE }}
          if-no-files-found: warn
          overwrite: true

  # ── 5th: Z세대·도시 (china-ent 완료 후) ─────────────
  z-lifestyle:
    needs: china-ent
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 의존 라이브러리 설치
        run: pip install feedparser anthropic requests python-dateutil
      - name: seen-titles 다운로드
        uses: actions/download-artifact@v4
        with:
          name: seen-titles
          path: .
        continue-on-error: true
      - name: Z-Gen & City Vibe 수집
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_WEEKLY_BRIEFING }}
          DISCORD_AUTO_CANDIDATES_WEBHOOK: ${{ secrets.DISCORD_AUTO_CANDIDATES_WEBHOOK }}
          SEEN_FILE: ${{ env.SEEN_FILE }}
        run: python scripts/z_lifestyle_digest.py
      - name: seen-titles 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seen-titles
          path: ${{ env.SEEN_FILE }}
          if-no-files-found: warn
          overwrite: true

  # ── 6th: 투자·M&A (z-lifestyle 완료 후, seen-titles 독립) ──
  deals:
    needs: z-lifestyle
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 의존 라이브러리 설치
        run: pip install feedparser anthropic requests python-dateutil
      - name: 투자·M&A Deals 수집
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_WEEKLY_BRIEFING }}
          DISCORD_DEALS_WEBHOOK: ${{ secrets.DISCORD_DEALS_WEBHOOK }}
        run: python scripts/deals_digest.py
