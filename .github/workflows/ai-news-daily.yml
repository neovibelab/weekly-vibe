name: Vibe 후보 수집 (매일)
# v3: 지역·언어 기반 수집. 5개 지역을 단일 job에서 순차 실행.
# 한국(한국어)·글로벌(영어)·중국(중국어)·일본(일본어)·동남아(영어+현지)

on:
  schedule:
    - cron: '0 22 * * *'   # 매일 07:00 KST (전일 22:00 UTC) — 8AM 배달용
  workflow_dispatch:
    inputs:
      region:
        description: '테스트할 지역 (비우면 전체 실행)'
        required: false
        type: choice
        options:
          - all
          - korea
          - global-en
          - china
          - japan
          - southeast-asia

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  SEEN_FILE: seen-titles.txt

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install anthropic requests

      - name: 한국
        if: ${{ github.event.inputs.region == '' || github.event.inputs.region == 'all' || github.event.inputs.region == 'korea' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_WEEKLY_BRIEFING }}
          DISCORD_KOREA_WEBHOOK: ${{ secrets.DISCORD_KOREA_WEBHOOK }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SEEN_FILE: ${{ env.SEEN_FILE }}
        run: python scripts/vibe_search.py korea || echo "[warn] korea 실패"

      - name: 글로벌(영어)
        if: ${{ github.event.inputs.region == '' || github.event.inputs.region == 'all' || github.event.inputs.region == 'global-en' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_WEEKLY_BRIEFING }}
          DISCORD_GLOBAL_EN_WEBHOOK: ${{ secrets.DISCORD_GLOBAL_EN_WEBHOOK }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SEEN_FILE: ${{ env.SEEN_FILE }}
        run: python scripts/vibe_search.py global-en || echo "[warn] global-en 실패"

      - name: 중국
        if: ${{ github.event.inputs.region == '' || github.event.inputs.region == 'all' || github.event.inputs.region == 'china' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_WEEKLY_BRIEFING }}
          DISCORD_CHINA_WEBHOOK: ${{ secrets.DISCORD_CHINA_WEBHOOK }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SEEN_FILE: ${{ env.SEEN_FILE }}
        run: python scripts/vibe_search.py china || echo "[warn] china 실패"

      - name: 일본
        if: ${{ github.event.inputs.region == '' || github.event.inputs.region == 'all' || github.event.inputs.region == 'japan' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_WEEKLY_BRIEFING }}
          DISCORD_JAPAN_WEBHOOK: ${{ secrets.DISCORD_JAPAN_WEBHOOK }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SEEN_FILE: ${{ env.SEEN_FILE }}
        run: python scripts/vibe_search.py japan || echo "[warn] japan 실패"

      - name: 동남아
        if: ${{ github.event.inputs.region == '' || github.event.inputs.region == 'all' || github.event.inputs.region == 'southeast-asia' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_WEEKLY_BRIEFING }}
          DISCORD_SOUTHEAST_ASIA_WEBHOOK: ${{ secrets.DISCORD_SOUTHEAST_ASIA_WEBHOOK }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SEEN_FILE: ${{ env.SEEN_FILE }}
        run: python scripts/vibe_search.py southeast-asia || echo "[warn] southeast-asia 실패"
