name: Vibe 후보 수집 (매일)
# v2: web_search 기반 통합 수집. 6개 주제를 단일 job에서 순차 실행.
# 구 RSS 기반 스크립트(ai_music_digest.py 등)는 이 워크플로에서 더 이상 사용하지 않음.

on:
  schedule:
    - cron: '0 0 * * *'   # 매일 09:00 KST
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  SEEN_FILE: seen-titles.txt

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install anthropic requests

      - name: 팬 행동
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_WEEKLY_BRIEFING }}
          DISCORD_FAN_BEHAVIOR_WEBHOOK: ${{ secrets.DISCORD_FAN_BEHAVIOR_WEBHOOK }}
          SEEN_FILE: ${{ env.SEEN_FILE }}
        run: python scripts/vibe_search.py fan-behavior || echo "[warn] fan-behavior 실패"

      - name: 소비자 행동
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_WEEKLY_BRIEFING }}
          DISCORD_CONSUMER_BEHAVIOR_WEBHOOK: ${{ secrets.DISCORD_CONSUMER_BEHAVIOR_WEBHOOK }}
          SEEN_FILE: ${{ env.SEEN_FILE }}
        run: python scripts/vibe_search.py consumer-behavior || echo "[warn] consumer-behavior 실패"

      - name: 엔터업계 딜
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_WEEKLY_BRIEFING }}
          DISCORD_ENT_DEALS_WEBHOOK: ${{ secrets.DISCORD_ENT_DEALS_WEBHOOK }}
          SEEN_FILE: ${{ env.SEEN_FILE }}
        run: python scripts/vibe_search.py ent-deals || echo "[warn] ent-deals 실패"

      - name: IP 비즈니스 사례
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_WEEKLY_BRIEFING }}
          DISCORD_IP_BUSINESS_WEBHOOK: ${{ secrets.DISCORD_IP_BUSINESS_WEBHOOK }}
          SEEN_FILE: ${{ env.SEEN_FILE }}
        run: python scripts/vibe_search.py ip-business || echo "[warn] ip-business 실패"

      - name: 아티스트 오너십
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_WEEKLY_BRIEFING }}
          DISCORD_ARTIST_OWNERSHIP_WEBHOOK: ${{ secrets.DISCORD_ARTIST_OWNERSHIP_WEBHOOK }}
          SEEN_FILE: ${{ env.SEEN_FILE }}
        run: python scripts/vibe_search.py artist-ownership || echo "[warn] artist-ownership 실패"

      - name: 테크 이슈
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_WEEKLY_BRIEFING }}
          DISCORD_TECH_ISSUES_WEBHOOK: ${{ secrets.DISCORD_TECH_ISSUES_WEBHOOK }}
          SEEN_FILE: ${{ env.SEEN_FILE }}
        run: python scripts/vibe_search.py tech-issues || echo "[warn] tech-issues 실패"
