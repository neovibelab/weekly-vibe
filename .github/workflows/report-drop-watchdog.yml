name: 리포트 드롭 백업 감시

# 정시 스케줄(discord-report-drop, 월 10:17 KST)이 GitHub의 best-effort 스케줄링
# 특성으로 누락될 때를 대비한 백업. 월요일 늦은 오전에 발송 여부를 점검하고,
# 미발송이면 직접 재발송 + 대표에게 메일 알림. (2026-06-15 신설 — 첫 주 정시 누락 대응)

on:
  schedule:
    - cron: '40 1 * * 1'   # 매주 월요일 10:40 KST (01:40 UTC) — 정시 드롭(10:17) 후 점검, 지연 버퍼 23분
  workflow_dispatch:

permissions:
  contents: read
  actions: read   # gh run list 로 정시 워크플로 런 이력 조회

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  watchdog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 오늘 드롭 발송 여부 점검
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/check_drop_posted.py

      - name: 백업 재발송 (미발송 시)
        id: heal
        if: steps.check.outputs.posted == 'no'
        continue-on-error: true
        env:
          DISCORD_REPORT_WEBHOOK_URL: ${{ secrets.DISCORD_REPORT_WEBHOOK_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}       # 백업 재발송 시에도 대시보드 뉴스룸 탭 적재
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python3 scripts/send_report_drop.py

      - name: 알림 메일 (미발송이었을 때)
        if: steps.check.outputs.posted == 'no'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          HEAL_OUTCOME: ${{ steps.heal.outcome }}
        run: python3 scripts/send_drop_alert.py

      - name: 결과 판정
        if: steps.check.outputs.posted == 'no'
        run: |
          if [ "${{ steps.heal.outcome }}" != "success" ]; then
            echo "::error::정시 누락 + 백업 재발송 실패 — 수동 조치 필요"
            exit 1
          fi
          echo "[info] 정시 누락 감지 → 백업이 드롭을 재발송 완료"
