name: 뉴스레터 수집 (매일)
# allowlist 발신자(sources_newsletters.json)의 새 뉴스레터를 Gmail(IMAP 앱비밀번호)로 가져와
# 분류 후 Supabase radar_items(collector='newsletter')에 적재. vibe_search와 같은 풀.

on:
  schedule:
    - cron: '30 0 * * *'    # 09:30 KST (00:30 UTC) — 아침 클러스터(빌보드 06시·롱블랙 ~09시·국내 일간 IPDaily/폴인레터 08시) 직후
    - cron: '0 14 * * *'     # 23:00 KST (14:00 UTC) — 저녁 클러스터(SCMP 다회·Jing 2판 ~22:25·Nanjing·Marion 저녁) 직후
  workflow_dispatch:
    inputs:
      lookback_days:
        description: '며칠 이내 메일 수집 (기본 2)'
        required: false
        default: '2'
      dry_run:
        description: 'dry-run (수집·분류만 — Supabase 미반영)'
        type: boolean
        default: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install anthropic requests
      - name: 뉴스레터 수집
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_WEEKLY_BRIEFING }}
          NL_LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '2' }}
        run: python scripts/newsletter_ingest.py ${{ inputs.dry_run && '--dry-run' || '' }}
