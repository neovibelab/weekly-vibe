name: 뉴스레터 수집 (매일)
# allowlist 발신자(sources_newsletters.json)의 새 뉴스레터를 Gmail API(OAuth)로 가져와
# 분류 후 Supabase radar_items(collector='newsletter')에 적재. vibe_search와 같은 풀.

on:
  schedule:
    - cron: '30 22 * * *'   # 매일 07:30 KST (전일 22:30 UTC) — vibe_search 07:00 직후
  workflow_dispatch:
    inputs:
      lookback_days:
        description: '며칠 이내 메일 수집 (기본 2)'
        required: false
        default: '2'

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install anthropic requests
      - name: 뉴스레터 수집
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_WEEKLY_BRIEFING }}
          NL_LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '2' }}
        run: python scripts/newsletter_ingest.py
