name: 디스코드 리포트 드롭 알림

on:
  schedule:
    - cron: '0 1 * * 1'  # 매주 월요일 10:00 KST (01:00 UTC)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  drop:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find latest drop file
        id: find
        run: |
          # drops/ 폴더에서 YY.MM.DD-주간리포트드롭.md 패턴 파일 중 파일명 기준 최신 1개
          LATEST=$(ls drops/*-주간리포트드롭.md 2>/dev/null | sort | tail -1)
          if [ -z "$LATEST" ]; then
            echo "::error::drops/ 폴더에 드롭 파일이 없습니다"
            exit 1
          fi
          echo "file=$LATEST" >> "$GITHUB_OUTPUT"
          echo "[info] 드롭 파일: $LATEST"

      - name: Read and clean drop content
        id: content
        run: |
          FILE="${{ steps.find.outputs.file }}"

          # HTML 주석(<!-- ... -->) 제거 후 앞뒤 공백 트림
          CLEANED=$(python3 - <<'PYEOF'
import re, sys

with open("$FILE", "r", encoding="utf-8") as f:
    text = f.read()

# HTML 주석 제거
text = re.sub(r'<!--.*?-->', '', text, flags=re.DOTALL)
text = text.strip()

# Discord 2000자 제한 — 안전 마진 10자 여유
if len(text) > 1990:
    text = text[:1990] + "\n…(이하 생략)"

print(text)
PYEOF
          )

          if [ -z "$CLEANED" ]; then
            echo "::error::드롭 파일 내용이 비어 있습니다"
            exit 1
          fi

          # 멀티라인 GITHUB_OUTPUT delimiter 방식
          {
            echo "text<<EOF_DROP"
            echo "$CLEANED"
            echo "EOF_DROP"
          } >> "$GITHUB_OUTPUT"

          echo "[info] 전송 내용 길이: ${#CLEANED}자"

      - name: Send Discord webhook
        env:
          DISCORD_REPORT_WEBHOOK_URL: ${{ secrets.DISCORD_REPORT_WEBHOOK_URL }}
          DROP_TEXT: ${{ steps.content.outputs.text }}
        run: |
          PAYLOAD=$(jq -n --arg content "$DROP_TEXT" '{"content": $content}')

          echo "[debug] payload 앞 200자: $(echo "$PAYLOAD" | head -c 200)"

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_REPORT_WEBHOOK_URL")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Discord webhook HTTP: $HTTP_CODE"
          echo "Discord response: $BODY"

          # Discord는 성공 시 204 No Content 반환
          if [ "$HTTP_CODE" -ne 204 ]; then
            echo "::error::Discord webhook 실패 (HTTP $HTTP_CODE)"
            exit 1
          fi

          echo "[info] Discord 전송 완료"
