name: 디스코드 리포트 드롭 알림

on:
  schedule:
    - cron: '17 1 * * 1'  # 매주 월요일 10:17 KST (01:17 UTC) — 정시(:00) 고부하 슬롯 회피로 스케줄 누락 방지
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  drop:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 발송 로직은 scripts/send_report_drop.py 공용 모듈 (백업 감시 워크플로와 공유).
      # 과거 YAML 인라인 heredoc 들여쓰기로 파일이 깨져 startup_failure가 났던 이력 →
      # 로직을 스크립트로 분리해 구조적으로 재발 차단 (2026-06-15).
      - name: Send latest drop to Discord
        env:
          DISCORD_REPORT_WEBHOOK_URL: ${{ secrets.DISCORD_REPORT_WEBHOOK_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}       # 드롭 신규 리포트를 대시보드 뉴스룸 탭에도 적재
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python3 scripts/send_report_drop.py
