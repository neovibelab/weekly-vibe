name: Vibe 풀 유지보수 (집계·정리)
# radar_items 풀 집계 + 자동수집 pending 최신 50개 초과분 → archived 전환.
# scripts/pool_maintenance.py. picked·manual은 영구 보존, 대시보드는 archived 숨김.
#
# - 매일 schedule(01:00 KST): 자동 정리(--apply)로 풀 ~50개 유지
# - 수동 dispatch: apply 체크 시 정리, 아니면 대상 미리보기(DB 변경 0)

on:
  workflow_dispatch:
    inputs:
      apply:
        description: '실제 archived 전환 (체크 안 하면 대상 미리보기)'
        type: boolean
        default: false
  schedule:
    - cron: '0 16 * * *'   # 매일 01:00 KST (16:00 UTC) — 풀 ~50개 유지

jobs:
  maintain:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - name: 풀 집계·정리
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/pool_maintenance.py --stats ${{ (github.event_name == 'schedule' || inputs.apply) && '--apply' || '' }}
