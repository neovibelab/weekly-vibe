name: 엔터 아시아 소스 (금요일)
# 무료 위클리 "엔터 아시아"(letter-01-mon-asia, 매주 월요일 발행) 제작용 소스를
# 매주 금요일 낮 woojin@neovibelab.com로 전달. Supabase radar_items 최근 14일·
# 일본/중국/동남아 활성 신호를 지역별로 정리 + 헤드라인 후보. 초안 작성은 대표 세션.
# 앱 상태에 의존하는 로컬 예약작업의 클라우드 백업 — 07-17 3호 누락 사고 재발 방지.

on:
  schedule:
    - cron: '0 3 * * 5'    # 매주 금 12:00 KST (03:00 UTC)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'dry-run (메일 미발송, 본문만 로그 출력)'
        type: boolean
        default: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - name: 아시아 소스 다이제스트 메일
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python scripts/asia_source_digest.py ${{ inputs.dry_run && '--dry-run' || '' }}
